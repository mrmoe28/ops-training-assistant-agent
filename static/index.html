<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lock28 Ops Assistant</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a0a0f;
  color: #e0e0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: #1a1a2e;
  padding: 12px 16px;
  border-bottom: 1px solid #2a2a3e;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
header h1 {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ff4444;
  animation: pulse 2s infinite;
}
.status-dot.online { background: #00e676; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.msg {
  max-width: 92%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.5;
  word-wrap: break-word;
}
.msg.user {
  align-self: flex-end;
  background: #2563eb;
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.bot {
  align-self: flex-start;
  background: #1e1e2e;
  color: #e0e0e0;
  border: 1px solid #2a2a3e;
  border-bottom-left-radius: 4px;
}
.msg.bot strong { color: #fff; }
.msg.bot em { color: #a0a0b0; }
.msg .sources {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid #2a2a3e;
  font-size: 11px;
  color: #6b7280;
}
.msg .typing { color: #6b7280; font-style: italic; }
#input-area {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  background: #1a1a2e;
  border-top: 1px solid #2a2a3e;
  flex-shrink: 0;
}
#q {
  flex: 1;
  background: #0f0f1a;
  border: 1px solid #2a2a3e;
  border-radius: 10px;
  padding: 10px 14px;
  color: #e0e0e0;
  font-size: 15px;
  outline: none;
}
#q:focus { border-color: #2563eb; }
#send {
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
#send:active { opacity: .8; }
#send:disabled { background: #1e3a5f; cursor: not-allowed; }
.quick-chips {
  display: flex;
  gap: 6px;
  padding: 6px 12px 10px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
.quick-chips::-webkit-scrollbar { display: none; }
.chip {
  background: #1e1e2e;
  border: 1px solid #2a2a3e;
  color: #8892b0;
  padding: 6px 12px;
  border-radius: 16px;
  font-size: 12px;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
.chip:active { background: #2a2a3e; }
.system-msg {
  align-self: center;
  font-size: 12px;
  color: #6b7280;
  padding: 4px 0;
}
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid #2563eb;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <div class="status-dot" id="status"></div>
  <h1>Ops Assistant</h1>
</header>
<div class="quick-chips" id="chips">
  <div class="chip" onclick="send('Latest completed job?')">Latest completed job</div>
  <div class="chip" onclick="send('How many jobs complete vs pending?')">Job counts</div>
  <div class="chip" onclick="send('Total revenue?')">Revenue</div>
  <div class="chip" onclick="send('Quote: 4 optimizers, normal roof, client: Smith')">Quick quote</div>
  <div class="chip" onclick="send('What services does Eko Solar offer?')">Services</div>
</div>
<div id="chat"></div>
<div id="input-area">
  <input type="text" id="q" placeholder="Ask about jobs, quotes, clients..." autocomplete="off">
  <button id="send" onclick="submit()">Send</button>
</div>
<script>
const chat = document.getElementById('chat');
const qInput = document.getElementById('q');
const sendBtn = document.getElementById('send');
const statusDot = document.getElementById('status');
let history = [];

async function checkHealth() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    statusDot.classList.toggle('online', d.ok);
  } catch { statusDot.classList.remove('online'); }
}
setInterval(checkHealth, 5000);
checkHealth();

function append(html, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function appendSystem(text) {
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function submit() {
  const text = qInput.value.trim();
  if (!text) return;
  send(text);
}

async function send(text) {
  qInput.value = '';
  append(text.replace(/</g,'&lt;'), 'user');
  const thinking = append('<span class="typing"><span class="spinner"></span> Thinking...</span>', 'bot');
  sendBtn.disabled = true;

  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({question: text, history: history.slice(-8), top_k: 6})
    });
    const d = await r.json();
    thinking.remove();

    let reply = (d.reply || 'No reply').replace(/</g,'&lt;');
    reply = reply.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    reply = reply.replace(/\*(.+?)\*/g, '<em>$1</em>');
    reply = reply.replace(/\n/g, '<br>');

    let srcHtml = '';
    if (d.sources && d.sources.length) {
      const top = d.sources.slice(0,3);
      srcHtml = '<div class="sources">Sources: ' + top.map(s =>
        s.source.replace('.md#chunk-',':').replace('private_ops/','').replace('imported/','')
      ).join(', ') + '</div>';
    }
    append(reply + srcHtml, 'bot');

    history.push({role:'user', content:text});
    history.push({role:'assistant', content:d.reply || ''});
  } catch (e) {
    thinking.remove();
    append('<span style="color:#ff4444">Error: ' + e.message + '</span>', 'bot');
  }
  sendBtn.disabled = false;
  chat.scrollTop = chat.scrollHeight;
}

qInput.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

appendSystem('Connected. Ask about jobs, quotes, or tap a chip above.');
</script>
</body>
</html>
